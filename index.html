<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玉山日报 | 核心数据与洞察</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap');
        body { font-family: 'Merriweather', serif; background-color: #fdfdfd; }
        h1, h2, h3, .masthead { font-family: 'Playfair Display', serif; }
        .rule-line { border-top: 1px solid #000; }
        .heavy-rule { border-top: 4px solid #000; }
        .sidebar-divider { border-right: 1px solid #e5e7eb; }
        #auth-screen { display: flex; }
        #content-wrapper { display: none; }
    </style>
</head>
<body class="text-gray-900">

    <!-- 密码保护界面 -->
    <div id="auth-screen" class="fixed inset-0 bg-[#fdfdfd] z-50 flex items-center justify-center">
        <div class="text-center p-8 border border-black max-w-sm w-full">
            <h1 class="text-3xl font-black mb-6">玉山日报</h1>
            <p class="text-sm text-gray-500 mb-8 uppercase tracking-widest">请验证您的访问权限</p>
            <input type="password" id="password-input" placeholder="请输入密码" class="w-full border-b-2 border-black p-2 mb-6 focus:outline-none text-center">
            <button onclick="checkPassword()" class="w-full bg-black text-white py-3 hover:bg-gray-800 transition uppercase tracking-widest text-sm">进入阅读</button>
            <p id="error-msg" class="text-red-500 text-xs mt-4 hidden">访问权限错误。</p>
        </div>
    </div>

    <!-- 内容区域 (默认隐藏) -->
    <div id="content-wrapper" class="max-w-7xl mx-auto px-6 py-12">
        <header class="text-center mb-16">
            <p class="text-xs uppercase tracking-[0.2em] mb-4 text-gray-500" id="date-display"></p>
            <h1 class="text-7xl md:text-9xl font-black tracking-tight mb-6">玉山日报</h1>
            <div class="heavy-rule w-24 mx-auto mb-4"></div>
            <p class="text-lg italic text-gray-600">深度、独立、洞见</p>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-12 gap-8">
            <aside class="md:col-span-3 sidebar-divider pr-8 space-y-12">
                <h3 class="text-sm font-bold uppercase tracking-widest pb-4 border-b-2 border-black">深度速递</h3>
                <div id="left-sidebar" class="space-y-10">
                    <!-- LEFT_SIDEBAR_START -->
                    <p class="text-sm text-gray-500 italic">正在加载...</p>
                    <!-- LEFT_SIDEBAR_END -->
                </div>
            </aside>

            <article class="md:col-span-6 space-y-8 px-0 md:px-4">
                <div id="main-feature" class="space-y-6">
                    <!-- MAIN_FEATURE_START -->
                    <h2 class="text-4xl font-bold leading-tight">今日社论</h2>
                    <p class="text-lg text-gray-700 leading-relaxed">系统正在生成今日核心深度报道，请稍候...</p>
                    <!-- MAIN_FEATURE_END -->
                </div>
            </article>

            <aside class="md:col-span-3 border-l border-gray-200 pl-8 space-y-12">
                <h3 class="text-sm font-bold uppercase tracking-widest pb-4 border-b-2 border-black">全球视角</h3>
                <div id="right-sidebar" class="space-y-10">
                    <!-- RIGHT_SIDEBAR_START -->
                    <p class="text-sm text-gray-500 italic">正在获取全球信号...</p>
                    <!-- RIGHT_SIDEBAR_END -->
                </div>
            </aside>
        </main>

        <section class="mt-24 pt-12 rule-line">
            <h2 class="text-2xl font-bold mb-10">往期回溯</h2>
            <div id="archive-list" class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <!-- ARCHIVE_START -->
                <p class="text-gray-500">正在检索历史记录...</p>
                <!-- ARCHIVE_END -->
            </div>
        </section>

        <footer class="mt-24 text-center text-xs text-gray-400 uppercase tracking-widest border-t pt-8">
            &copy; 2026 玉山日报社 · 金融与科技前沿观察
        </footer>
    </div>

    <script>
        // 设置你的密码
        const MY_SECRET = "123456"; // 请在这里修改为你的密码

        function checkPassword() {
            const input = document.getElementById('password-input').value;
            if (input === MY_SECRET) {
                sessionStorage.setItem('isAuthorized', 'true');
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('content-wrapper').style.display = 'block';
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        // 检查登录状态
        window.onload = function() {
            document.getElementById('date-display').innerText = new Date().toLocaleDateString('zh-CN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            
            if (sessionStorage.getItem('isAuthorized') === 'true') {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('content-wrapper').style.display = 'block';
            }
        };
    </script>
</body>
</html>
