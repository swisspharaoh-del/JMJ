<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玉山日报 | 深度 · 独立 · 洞见</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap');
        body { font-family: 'Merriweather', serif; background-color: #fdfdfd; }
        h1, h2, h3, .masthead { font-family: 'Playfair Display', serif; }
        .sidebar-divider { border-right: 1px solid #e5e7eb; }
        #content-wrapper { display: none; }
    </style>
</head>
<body class="text-gray-900">

    <div id="auth-screen" class="fixed inset-0 bg-[#fdfdfd] z-50 flex items-center justify-center">
        <div class="text-center p-8 border border-black max-w-sm w-full">
            <h1 class="text-3xl font-black mb-6">玉山日报</h1>
            <input type="password" id="password-input" placeholder="请输入密码" class="w-full border-b-2 border-black p-2 mb-6 focus:outline-none text-center">
            <button onclick="checkPassword()" class="w-full bg-black text-white py-3 hover:bg-gray-800 transition text-sm uppercase tracking-widest">进入阅读</button>
        </div>
    </div>

    <!-- 模态阅读窗 -->
    <div id="article-modal" class="fixed inset-0 z-[100] hidden bg-white overflow-y-auto">
        <div class="max-w-3xl mx-auto py-20 px-6">
            <button onclick="closeModal()" class="mb-8 text-sm uppercase tracking-widest underline hover:text-gray-600">关闭阅读</button>
            <h2 id="modal-title" class="text-5xl font-black mb-8 leading-tight"></h2>
            <div id="modal-content" class="text-lg leading-loose text-gray-800 space-y-6"></div>
        </div>
    </div>

    <div id="content-wrapper" class="max-w-7xl mx-auto px-6 py-12">
        <header class="text-center mb-16">
            <h1 class="text-7xl font-black tracking-tight mb-4">玉山日报</h1>
            <div class="w-16 h-[1px] bg-black mx-auto mb-4"></div>
            <p class="text-sm tracking-[0.3em] uppercase font-bold text-gray-600">深度 · 独立 · 洞见</p>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-12 gap-8">
            <!-- 左侧边栏 -->
            <aside class="md:col-span-3 sidebar-divider pr-8 space-y-12">
                <h3 class="font-bold border-b border-black pb-2 mb-4 uppercase text-xs tracking-widest">深度速递</h3>
                <div class="space-y-6" id="left-sidebar-content">
                    <!-- BUILD_MARKER_LEFT_START -->

<!-- BUILD_MARKER_LEFT_END -->
                </div>
            </aside>
            
            <!-- 中间主内容 -->
            <article class="md:col-span-6 px-4">
                <h3 class="font-bold border-b border-black pb-2 mb-6 uppercase text-xs tracking-widest">今日核心</h3>
                <div id="main-feature-content">
                    <!-- BUILD_MARKER_MAIN_START -->
<h2 class="text-4xl font-bold mb-6">今日市场观测</h2><div class="text-lg leading-relaxed">这里是你的正文，这里的内容会自动展示在模态窗口里，不会被截断。...</div>
<!-- BUILD_MARKER_MAIN_END -->
                </div>
            </article>

            <!-- 右侧边栏 -->
            <aside class="md:col-span-3 border-l border-gray-200 pl-8 space-y-12">
                <h3 class="font-bold border-b border-black pb-2 mb-4 uppercase text-xs tracking-widest">全球视角</h3>
                <div class="space-y-6" id="right-sidebar-content">
                    <!-- BUILD_MARKER_RIGHT_START -->

<!-- BUILD_MARKER_RIGHT_END -->
                </div>
            </aside>
        </main>

        <!-- 底部往期回顾 -->
        <section class="mt-20 pt-12 border-t border-gray-200">
            <h3 class="font-bold mb-8 uppercase text-xs tracking-widest">往期回顾</h3>
            <div class="flex flex-col gap-6" id="archive-section">
                <!-- BUILD_MARKER_ARCHIVE_START -->

<!-- BUILD_MARKER_ARCHIVE_END -->
            </div>
        </section>
    </div>

    <script>
        const PASSWORD_HASH = "8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92";
        async function sha256(m){ const b=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(m)); return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join(''); }
        async function checkPassword() { if (await sha256(document.getElementById('password-input').value) === PASSWORD_HASH) { document.getElementById('auth-screen').style.display = 'none'; document.getElementById('content-wrapper').style.display = 'block'; } else { alert("密码错误"); } }
        function openArticle(t, c) { document.getElementById('modal-title').innerText = t; document.getElementById('modal-content').innerText = c; document.getElementById('article-modal').classList.remove('hidden'); document.body.style.overflow = 'hidden'; }
        function closeModal() { document.getElementById('article-modal').classList.add('hidden'); document.body.style.overflow = 'auto'; }
    </script>
</body>
</html>
