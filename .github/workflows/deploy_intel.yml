name: Generate Intelligence Briefing
on:
  schedule:
    - cron: '10 02 * * *' # 每天 UTC 时间 0 点（北京时间 8 点）运行
  workflow_dispatch: # 允许你手动在 GitHub 网页上点击按钮运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          pip install google-generativeai
          
      - name: Run Intel Script
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python update_intel.py
          
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add index.html
          git commit -m "Update Daily Intel Briefing" || echo "No changes to commit"
          git push
